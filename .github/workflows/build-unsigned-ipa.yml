name: build-unsigned-ipa

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-ipa:
    runs-on: macos-latest
    env:
      CI: "1"
      EXPO_NO_TELEMETRY: "1"
      NODE_OPTIONS: --max_old_space_size=4096
      DISABLE_EXPO_WIDGETS: "1"
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 无签名构建准备
        run: |
          if [ "$DISABLE_EXPO_WIDGETS" = "1" ]; then
            node -e '
              const fs = require("fs");
              const pkg = JSON.parse(fs.readFileSync("package.json", "utf8"));
              if (pkg.dependencies) {
                delete pkg.dependencies["@expo/ui"];
                delete pkg.dependencies["expo-widgets"];
              }
              fs.writeFileSync("package.json", JSON.stringify(pkg, null, 2));
            '
            rm -f package-lock.json
          fi

      - name: 安装依赖
        run: npm install --legacy-peer-deps

      - name: 生成 iOS 原生工程
        run: npx expo prebuild --platform ios --non-interactive --clean

      - name: 安装 CocoaPods
        run: |
          if [ -f ios/Podfile ]; then
            pod install --project-directory=ios
          fi

      - name: 调整 Pod 编译参数
        run: |
          if [ -f ios/Pods/Target\ Support\ Files/ZXingObjC/ZXingObjC.debug.xcconfig ]; then
            ruby -e '
              Dir["ios/Pods/Target Support Files/**/*.xcconfig"].each do |path|
                content = File.read(path)
                content.gsub!(/-Werror=non-modular-include-in-framework-module/, "-Wno-non-modular-include-in-framework-module")
                content.gsub!(/-Werror=return-type/, "-Wno-error=return-type")
                content.gsub!(/-Werror=deprecated-objc-isa-usage/, "-Wno-error=deprecated-objc-isa-usage")
                content.gsub!(/-Werror=objc-root-class/, "-Wno-error=objc-root-class")
                File.write(path, content)
              end
            '
          fi

      - name: 解析工程信息
        run: |
          WORKSPACE="$(find ios -maxdepth 1 -name '*.xcworkspace' | head -n 1)"
          PROJECT="$(find ios -maxdepth 1 -name '*.xcodeproj' | head -n 1)"

          if [ -n "$WORKSPACE" ]; then
            SCHEME="$(xcodebuild -list -json -workspace "$WORKSPACE" | ruby -rjson -e 'data = JSON.parse(STDIN.read); app_scheme = "Super798"; schemes = data.dig("workspace", "schemes") || data.dig("project", "schemes") || []; preferred = schemes.find { |name| name == app_scheme } || schemes.find { |name| !name.start_with?("Pods-", "Expo", "React", "EX", "hermes") } || schemes.first; puts((preferred || "").to_s)')"
            echo "XCODE_CONTAINER=$WORKSPACE" >> "$GITHUB_ENV"
            echo "XCODE_CONTAINER_KIND=workspace" >> "$GITHUB_ENV"
          elif [ -n "$PROJECT" ]; then
            SCHEME="$(xcodebuild -list -json -project "$PROJECT" | ruby -rjson -e 'data = JSON.parse(STDIN.read); app_scheme = "Super798"; schemes = data.dig("project", "schemes") || data.dig("workspace", "schemes") || []; preferred = schemes.find { |name| name == app_scheme } || schemes.find { |name| !name.start_with?("Pods-", "Expo", "React", "EX", "hermes") } || schemes.first; puts((preferred || "").to_s)')"
            echo "XCODE_CONTAINER=$PROJECT" >> "$GITHUB_ENV"
            echo "XCODE_CONTAINER_KIND=project" >> "$GITHUB_ENV"
          else
            echo "未找到 iOS 原生工程文件"
            exit 1
          fi

          if [ -z "$SCHEME" ]; then
            SCHEME="$(find ios -path '*/xcshareddata/xcschemes/*.xcscheme' -exec basename {} .xcscheme \; | ruby -e 'app_scheme = "Super798"; schemes = STDIN.read.split("\n"); preferred = schemes.find { |name| name == app_scheme } || schemes.find { |name| !name.start_with?("Pods-", "Expo", "React", "EX", "hermes") } || schemes.first; puts((preferred || "").to_s)')"
          fi

          if [ -z "$SCHEME" ]; then
            echo "未找到可用的主应用 Scheme"
            echo "workspace=$WORKSPACE"
            echo "project=$PROJECT"
            find ios -path '*/xcshareddata/xcschemes/*.xcscheme' -print || true
            exit 1
          fi

          echo "XCODE_SCHEME=$SCHEME" >> "$GITHUB_ENV"
          echo "使用的工程容器: ${WORKSPACE:-$PROJECT}"
          echo "使用的 Scheme: $SCHEME"

      - name: 构建未签名应用
        run: |
          DERIVED_DATA="$RUNNER_TEMP/DerivedData"
          echo "DERIVED_DATA=$DERIVED_DATA" >> "$GITHUB_ENV"

          if [ "$XCODE_CONTAINER_KIND" = "workspace" ]; then
            xcodebuild build \
              -workspace "$XCODE_CONTAINER" \
              -scheme "$XCODE_SCHEME" \
              -configuration Release \
              -derivedDataPath "$DERIVED_DATA" \
              -destination 'generic/platform=iOS' \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO
          else
            xcodebuild build \
              -project "$XCODE_CONTAINER" \
              -scheme "$XCODE_SCHEME" \
              -configuration Release \
              -derivedDataPath "$DERIVED_DATA" \
              -destination 'generic/platform=iOS' \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO
          fi

      - name: 封装未签名 IPA
        run: |
          # 在 DerivedData 中查找 .app
          echo "在 DerivedData 中查找 .app ..."
          APP_PATH="$(find "$DERIVED_DATA/Build/Products/Release-iphoneos" -name '*.app' -type d -maxdepth 1 | head -n 1)"

          if [ -z "$APP_PATH" ]; then
            echo "Release-iphoneos 目录未找到 .app，尝试全局搜索 DerivedData ..."
            APP_PATH="$(find "$DERIVED_DATA" -name '*.app' -type d | head -n 1)"
          fi

          if [ -z "$APP_PATH" ]; then
            echo "❌ 未找到 .app，以下是 DerivedData 中的内容："
            find "$DERIVED_DATA/Build/Products" -type d -maxdepth 3 || true
            exit 1
          fi

          echo "✅ 找到应用：$APP_PATH"
          mkdir -p "$RUNNER_TEMP/ipa/Payload"
          cp -R "$APP_PATH" "$RUNNER_TEMP/ipa/Payload/"

          cd "$RUNNER_TEMP/ipa"
          zip -qry "$RUNNER_TEMP/ipa/Super798.ipa" Payload
          echo "✅ 未签名 IPA 已生成：$RUNNER_TEMP/ipa/Super798.ipa"

      - name: 上传 IPA
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-ipa
          path: ${{ runner.temp }}/ipa/Super798.ipa
