name: build-ios-with-eas

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-ipa:
    runs-on: macos-latest
    env:
      CI: "1"
      EXPO_NO_TELEMETRY: "1"
      NODE_OPTIONS: --max_old_space_size=4096
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装依赖
        run: npm install --legacy-peer-deps

      - name: 校验 Expo Token
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "缺少 secrets.EXPO_TOKEN，无法在 CI 中调用 EAS Build"
            exit 1
          fi

      - name: 触发 EAS iOS 正式构建
        run: npx eas-cli@latest build --platform ios --profile production --non-interactive --wait

      - name: 上传说明
        uses: actions/upload-artifact@v4
        with:
          name: eas-build-note
          path: eas.json
